<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D OBJ Multiple Viewer with Cloud Background</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <div id="cameraButtons">
    <button onclick="setCameraView('wide')">มุมกว้าง</button>
    <button onclick="setCameraView('medium')">มุมกลาง</button>
    <button onclick="setCameraView('close')">มุมใกล้</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/EXRLoader.js"></script>
</head>
<body>
    
    <div id="canvas-container"></div>

    <script>
        const HDR_FOLDER_PATH = 'hdr/';
        const DEFAULT_HDR_FILE = 'Day.exr'; 
        
        const MODEL_FOLDER_PATH = 'AllModels/';
        
        const FILE_LIST = [
            'RealMain.obj',
            'RealMain.mtl',
            'RealMain1.obj',
            'RealMain1.mtl'
        ];
        
        const container = document.getElementById('canvas-container');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 1.1, 5000);
        camera.position.set(0, 5, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0; 

        const ambientLight = new THREE.AmbientLight(0xffffff, 10.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 10.8);
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);


        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        let globalModelSize = 10;

        // ==========================================
        // [ระบบก้อนเมฆพื้นหลัง]
        // ==========================================
        const cloudsArray = [];
        const textureLoader = new THREE.TextureLoader();
        const cloudTexture = textureLoader.load('cloud.png');
        cloudTexture.magFilter = THREE.LinearFilter;
        cloudTexture.minFilter = THREE.LinearFilter;

        function createSingleCloudMesh(segments, radius) {
            const group = new THREE.Group();
            
            const cloudMat = new THREE.MeshBasicMaterial({
                map: cloudTexture,
                transparent: true,
                opacity: 0.2,
                depthWrite: false,
                side: THREE.DoubleSide
            });
            
            const geo = new THREE.SphereGeometry(radius, 2, 8);

            for (let i = 0; i < segments; i++) {
                const mesh = new THREE.Mesh(geo, cloudMat);
                mesh.position.set(
                    (Math.random() - 0.5) * radius * 20.5,
                    (Math.random() - 0.5) * radius * 0,
                    (Math.random() - 0.5) * radius * 20.5
                );
                const s = 3.5 + Math.random() * 3.5;
                mesh.scale.set(s, s, s);
                
                mesh.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );

                group.add(mesh);
            }
            return group;
        }

        function spawnCloud(x, y, z) {
            const cloudGroup = new THREE.Group();

            const layer1 = createSingleCloudMesh(10, 3);
            const layer2 = createSingleCloudMesh(10, 4);
            layer2.position.set(0, 1, 0);

            cloudGroup.add(layer1);
            cloudGroup.add(layer2);

            cloudGroup.position.set(x, -48, z);

            // เพิ่มความเร็ว
            cloudGroup.userData.speed = 0.05 + Math.random() * 0.08;

            scene.add(cloudGroup);
            cloudsArray.push(cloudGroup);
        }

        const numberOfClouds = 200;
        for (let i = 0; i < numberOfClouds; i++) {
            const x = (Math.random() - 0.5) * 1000;  
            const y = (Math.random() - 0.5) * 1;  
            const z = (Math.random() - 0.5) * 1000;  
            
            spawnCloud(x, y, z);
        }
        // ==========================================

        function getDefaultMaterial() {
            return new THREE.MeshStandardMaterial({
                color: 0xcccccc,
                roughness: 0.15,
                metalness: 0.4,
                side: THREE.DoubleSide
            });
        }

        function finalizeSceneConfiguration() {
            if (modelGroup.children.length === 0) return;

            modelGroup.position.set(0, 0, 0);

            const box = new THREE.Box3().setFromObject(modelGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            modelGroup.position.sub(center);

            globalModelSize = Math.max(size.x, size.y, size.z);
            
            camera.position.set(0, globalModelSize * 0.5, globalModelSize * 1.5);
            controls.maxDistance = globalModelSize * 10;
            controls.target.set(0, 0, 0);
            controls.update();
        }
        window.addEventListener("keydown", (event) => {

            if (event.code === "KeyW") {

                console.log(
        `camera.position.set(${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)});
        controls.target.set(${controls.target.x.toFixed(2)}, ${controls.target.y.toFixed(2)}, ${controls.target.z.toFixed(2)});
        controls.update();`
                );

            }

        });
        function setCameraView(type){

            switch(type){

                case "wide":
                    camera.position.set(822.15, 231.45, 186.47);
                    controls.target.set(-0.20, -6.07, 42.83);
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 3; 

                    break;

                case "medium":
                     camera.position.set(-72.74, -23.64, 31.03);
                    controls.target.set(-53.87, -23.07, 30.72);
                    controls.autoRotate = false;
                    camera.fov = 30;

                    break;

                case "close":
                    camera.position.set(31.89, -21.59, 14.63);
                    controls.target.set(4.85, -19.46, 30.71);
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 0.2; 
                    camera.fov = 20;
                    break;
            }
             
            controls.update();
            camera.updateProjectionMatrix();
        }
        async function loadModelsFromSeverFolder() {
            try {
                while(modelGroup.children.length > 0){
                    modelGroup.remove(modelGroup.children[0]);
                }

                let objCount = 0;
                const loadingManager = new THREE.LoadingManager();
                
                loadingManager.setURLModifier((url) => {
                    const fileName = url.split('/').pop().split('?')[0]; 
                    const fileNameLower = fileName.toLowerCase();

                    const match = FILE_LIST.find(f => f.toLowerCase() === fileNameLower);
                    if (match) {
                        return MODEL_FOLDER_PATH + match;
                    }

                    if (fileNameLower.endsWith('.png') || fileNameLower.endsWith('.jpg') || fileNameLower.endsWith('.jpeg')) {
                        return MODEL_FOLDER_PATH + fileName;
                    }

                    return url;
                });

                const objFiles = FILE_LIST.filter(name => name.toLowerCase().endsWith('.obj'));
                const mtlFiles = FILE_LIST.filter(name => name.toLowerCase().endsWith('.mtl'));

                const objLoader = new THREE.OBJLoader(loadingManager);
                const mtlLoader = new THREE.MTLLoader(loadingManager);
                mtlLoader.setPath(MODEL_FOLDER_PATH); 

                for (const objFileName of objFiles) {
                    objCount++;
                    let materialsLoaded = false;
                    
                    const expectedMtlName = objFileName.replace(/\.obj$/i, '.mtl').toLowerCase();
                    const hasMtl = mtlFiles.some(f => f.toLowerCase() === expectedMtlName);

                    if (hasMtl) {
                        try {
                            const materials = await new Promise((resolve, reject) => {
                                mtlLoader.load(objFileName.replace(/\.obj$/i, '.mtl'), resolve, null, reject);
                            });
                            materials.preload();
                            objLoader.setMaterials(materials);
                            materialsLoaded = true;
                        } catch (e) {
                            console.warn(`ไม่สามารถโหลดแมททีเรียล ${expectedMtlName} ได้:`, e);
                        }
                    } else {
                        objLoader.setMaterials(null);
                    }

                    const obj = await new Promise((resolve, reject) => {
                        objLoader.load(MODEL_FOLDER_PATH + objFileName, resolve, null, reject);
                    });

                    obj.traverse(function(child) {
                        if (child.isMesh) {
                            const materials = Array.isArray(child.material) ? child.material : [child.material];
                            let hasValidTexture = false;

                            materials.forEach((mat) => {
                                if (materialsLoaded && mat && (mat.map || mat.name)) {
                                    hasValidTexture = true;
                                    mat.side = THREE.DoubleSide;
                                }
                            });

                            if (!hasValidTexture) {
                                child.material = getDefaultMaterial();
                            }
                        }
                    });

                    modelGroup.add(obj);
                }

                if (objCount > 0) {
                    finalizeSceneConfiguration();
                }

            } catch (err) {
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', loadModelsFromSeverFolder);
        
        function loadEnvironmentFromFolder(fileName) {
            if (!fileName) return;
            const fileUrl = HDR_FOLDER_PATH + fileName;
            const fileExtension = fileName.split('.').pop().toLowerCase();
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();
            
            let loader = (fileExtension === 'exr') ? new THREE.EXRLoader() : new THREE.RGBELoader();
            loader.load(fileUrl, function (texture) {
                const envMap = pmremGenerator.fromEquirectangular(texture).texture;
                scene.background = envMap;
                scene.environment = envMap;
                texture.dispose();
                ambientLight.intensity = 0.1;
                dirLight1.intensity = 0.3;
            }, null, function(err){ console.error(err); });
        }

        loadEnvironmentFromFolder(DEFAULT_HDR_FILE);

        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();

            cloudsArray.forEach((cloud) => {

                cloud.position.x += cloud.userData.speed;

                // ถ้าหลุดฉากให้กลับไปอีกฝั่ง
                if (cloud.position.x > 500) {
                    cloud.position.x = -500;
                }

            });
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
          
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
