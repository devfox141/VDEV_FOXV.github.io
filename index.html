<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMT6901</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* กำหนด font-size พื้นฐานตามความกว้างหน้าจอ (vw = Viewport Width) */
    html {
        /* ย่อ/ขยายตามขนาดจอ แต่ไม่ให้เล็กเกิน 12px หรือใหญ่เกิน 18px */
        font-size: clamp(12px, 1.1vw, 18px); 
    }

    body {
        font-family: 'Inter', sans-serif;
        background: #000;
        overflow: hidden;
        color: white;
    }

    #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 0;
    }

    .ui-layer {
        position: fixed;
        z-index: 10;
        pointer-events: none;
    }

    .interactive {
        pointer-events: auto;
    }

    .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
    }

    /* ปรับ bg-ui ให้ใช้หน่วย rem/vw เพื่อให้ย่อ-ขยายตามหน้าจอ */
    .bg-ui {
        display: flex;
        justify-content: center;
        align-items: center;

        width: clamp(100px, 12vw, 160px);   /* ย่อตามจอ */
        height: clamp(32px, 3.5vw, 45px);   /* ย่อตามจอ */

        color: #fff;
        font-size: clamp(0.75rem, 1vw, 1rem); /* ย่อตัวหนังสือตามจอ */
        font-family: sans-serif;
        user-select: none;
        transition: 0.3s ease;
        text-align: center;
    }
</style></head>

<body>

<div id="canvas-container"></div>

<div class="ui">

        <nav class="glass flex justify-between items-center px-6 py-3">

        </nav>
    </header>

    <main class="p-10 pointer">

        <h1 class="text-7xl font-light leading-tight">
           
        </h1>

    </main>

</div>

<!-- THREE -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="main.js"></script>

<script>
function handleCameraChange(viewType) {
   if (typeof window.initSet1 === "function") {

        // หลังจากรัน initSet1 แล้ว เช็กอีกครั้งว่า setCameraView พร้อมใช้งานหรือยัง
        if (typeof window.setCameraView === "function") {
            window.setCameraView(viewType);
        } else {
            console.warn("Ran initSet1, but setCameraView is still not available.");
        }
    } 
    // 3. ถ้าไม่มีทั้งคู่
    else {
        console.warn("Neither setCameraView nor initSet1 is available.");
    }
}
</script>
