<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMT6901</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            color: white;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ให้ส่วน UI ซ้อนอยู่เหนือ Canvas และยอมให้เมาส์ทะลุไปหมุนกล้องด้านหลังได้ */
        .ui-layer {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        /* อนุญาตให้องค์ประกอบโต้ตอบได้ (ปุ่ม/ลิงก์) รับการคลิกได้ปกติ */
        .interactive {
            pointer-events: auto;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        .bg-ui{
            display:flex;
            justify-content:center;
            align-items:center;

            width:160px;
            height:45px;

            color:#fff;
            font-size:16px;
            font-family:sans-serif;
            user-select:none;

            transition:0.3s ease;
        }
     
    </style>

    </style>
</head>

<body>

<div id="canvas-container"></div>

<div class="ui">

    <header class="p-6 pointer">
        <nav class="glass flex justify-between items-center px-6 py-3">

            <h1 class="text-2xl font-semibold">
                CMT6901
            </h1>
            <div class="bg-ui">
                กิจกรรมทำพานไหว้ครู
            </div>
            <div class="hidden md:flex gap-8">
                <a href="#" onclick="switchToSet1(); return false;">HOME</a>

                <a href="#" onclick="switchToSet2(); return false;">ACTIVITY</a>
                ACTIVITY
                </a>
                <a href="#">PORTFOLIO</a>

            </div>

            <div class="flex gap-2">

            <button onclick="handleCameraChange('wide')">
                มุมกว้าง
            </button>

            <button onclick="setCameraView('medium')">
                มุมกลาง
            </button>

            <button onclick="setCameraView('close')">
                มุมใกล้
            </button>

            </div>

        </nav>
    </header>

    <main class="p-10 pointer">

        <h1 class="text-7xl font-light leading-tight">
           
        </h1>

    </main>

</div>

<!-- THREE -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/EXRLoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/ColorCorrectionShader.js"></script>

<!-- main.js -->
<script src="main.js"></script>

<script>
function handleCameraChange(viewType) {
   if (typeof window.initSet1 === "function") {

        // หลังจากรัน initSet1 แล้ว เช็กอีกครั้งว่า setCameraView พร้อมใช้งานหรือยัง
        if (typeof window.setCameraView === "function") {
            window.setCameraView(viewType);
        } else {
            console.warn("Ran initSet1, but setCameraView is still not available.");
        }
    } 
    // 3. ถ้าไม่มีทั้งคู่
    else {
        console.warn("Neither setCameraView nor initSet1 is available.");
    }
}
</script>

</body>
</html>
